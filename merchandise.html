<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recommended Gear &mdash; bflabby.org</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #050510;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      padding: 2rem;
      padding-bottom: 3rem;
      text-align: center;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 255, 180, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 180, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridScroll 20s linear infinite;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes gridScroll {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 720px;
      width: 100%;
    }

    .back-btn {
      display: inline-block;
      border: 1px solid rgba(0, 255, 180, 0.4);
      color: rgba(0, 255, 180, 0.6);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.4rem 1rem;
      margin-bottom: 2rem;
      transition: border-color 0.2s, color 0.2s;
    }

    .back-btn:hover {
      border-color: #00ffb4;
      color: #00ffb4;
    }

    .badge {
      display: inline-block;
      border: 1px solid #00ffb4;
      color: #00ffb4;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      padding: 0.3rem 1rem;
      margin-bottom: 2rem;
      text-transform: uppercase;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px #00ffb4; }
      50% { opacity: 0.6; box-shadow: 0 0 2px #00ffb4; }
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 6vw, 3.5rem);
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #00ffb4, #00aaff, #00ffb4);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer 4s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .panel {
      border: 1px solid rgba(0, 255, 180, 0.3);
      background: rgba(0, 255, 180, 0.03);
      padding: 2rem;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .panel::before {
      content: attr(data-label);
      position: absolute;
      top: -0.6rem;
      left: 1.5rem;
      background: #050510;
      padding: 0 0.5rem;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #00ffb4;
      text-transform: uppercase;
    }

    .panel p {
      color: #a0ffd8;
      font-size: 1rem;
      line-height: 1.8;
    }

    .footer {
      font-size: 0.7rem;
      color: #004433;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2rem;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #050510; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 255, 180, 0.3); }
  </style>
</head>
<body>
  <div class="container">

    <a href="index.html" class="back-btn">&larr; Back</a>

    <div class="badge">Recommended Gear &mdash; bflabby.org</div>

    <h1>STUFF I ACTUALLY USE</h1>

    <div class="panel" data-label="Coming Soon">
      <p>
        Product recommendations are being assembled.<br />
        Check back soon — only gear that has been field tested,<br />
        approved by someone in their 40s, and deemed worth the money.
      </p>
    </div>

    <p class="footer">bflabby.org &mdash; est. 1979 &mdash; all rights reserved, not that anyone wants them</p>

  </div>
</body>
</html>
